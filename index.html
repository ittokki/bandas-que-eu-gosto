<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandas que eu gosto e recomendo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --surface3: #272727;
    --border: rgba(255,255,255,0.07);
    --text: #f0ede8;
    --text-muted: #7a7570;
    --text-dim: #4a4743;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --accent-glow: rgba(200,169,110,0.25);
    --red: #c85a5a;
    --green: #6ec88a;
    --sidebar-w: 260px;
    --player-h: 88px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  .app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: 1fr var(--player-h);
    height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    grid-row: 1 / 2;
    background: #111111;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 28px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sidebar-title {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: 0.01em;
  }

  .sidebar-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .genre-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--surface3) transparent;
  }

  .genre-list::-webkit-scrollbar { width: 4px; }
  .genre-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  .genre-label {
    padding: 10px 20px 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .genre-item {
    padding: 8px 20px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    transition: color 0.15s, background 0.15s;
    border-left: 2px solid transparent;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .genre-item:hover {
    color: var(--text);
    background: var(--accent-dim);
  }

  .genre-item.active {
    color: var(--accent);
    border-left-color: var(--accent);
    background: var(--accent-dim);
    font-weight: 500;
  }

  /* ── MAIN ── */
  .main {
    grid-row: 1 / 2;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .main-header {
    padding: 28px 32px 0;
    flex-shrink: 0;
  }

  .genre-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .genre-desc {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 300;
    max-width: 520px;
    line-height: 1.6;
  }

  .track-table-header {
    display: grid;
    grid-template-columns: 28px 1fr 180px 60px;
    padding: 12px 32px;
    margin-top: 20px;
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .track-list {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--surface3) transparent;
  }

  .track-list::-webkit-scrollbar { width: 4px; }
  .track-list::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

  .track-row {
    display: grid;
    grid-template-columns: 28px 1fr 180px 60px;
    align-items: center;
    padding: 0 32px;
    height: 56px;
    cursor: pointer;
    transition: background 0.12s;
    border-radius: 4px;
    margin: 0 8px;
    position: relative;
  }

  .track-row:hover {
    background: var(--surface);
  }

  .track-row.playing {
    background: var(--accent-dim);
  }

  .track-num {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .track-row.playing .track-num {
    color: var(--accent);
  }

  .playing-bars {
    display: none;
    align-items: flex-end;
    gap: 2px;
    height: 14px;
  }

  .track-row.playing .playing-bars {
    display: flex;
  }

  .track-row.playing .track-num-static {
    display: none;
  }

  .playing-bars span {
    width: 3px;
    background: var(--accent);
    border-radius: 1px;
    animation: bar 0.8s ease-in-out infinite alternate;
  }

  .playing-bars span:nth-child(1) { height: 6px; animation-delay: 0s; }
  .playing-bars span:nth-child(2) { height: 12px; animation-delay: 0.2s; }
  .playing-bars span:nth-child(3) { height: 8px; animation-delay: 0.4s; }

  @keyframes bar {
    from { opacity: 0.5; transform: scaleY(0.5); }
    to { opacity: 1; transform: scaleY(1); }
  }

  .track-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
    overflow: hidden;
    padding-right: 16px;
  }

  .track-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .track-row.playing .track-name {
    color: var(--accent);
  }

  .track-artist {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 300;
  }

  .track-note-preview {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-style: italic;
    padding-right: 12px;
  }

  .track-duration {
    font-size: 12px;
    color: var(--text-muted);
    text-align: right;
  }

  /* note tooltip */
  .note-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s, border-color 0.15s;
  }

  .track-row:hover .note-btn {
    opacity: 1;
  }

  .note-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  /* ── PLAYER BAR ── */
  .player-bar {
    grid-column: 1 / -1;
    background: #111;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
  }

  .player-track {
    display: flex;
    align-items: center;
    gap: 12px;
    overflow: hidden;
  }

  .player-thumb {
    width: 44px;
    height: 44px;
    border-radius: 4px;
    background: var(--surface3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--text-dim);
    overflow: hidden;
    position: relative;
  }

  .player-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 4px;
  }

  .player-track-info {
    overflow: hidden;
    flex: 1;
  }

  .player-track-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-track-artist {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .player-controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .player-buttons {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }

  .ctrl-btn:hover { color: var(--text); }

  .ctrl-btn.play {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--text);
    color: #111;
    transition: background 0.15s, transform 0.1s;
  }

  .ctrl-btn.play:hover {
    background: var(--accent);
    transform: scale(1.05);
  }

  .progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
  }

  .time-label {
    font-size: 11px;
    color: var(--text-dim);
    width: 32px;
    text-align: center;
    flex-shrink: 0;
  }

  .progress-bar {
    flex: 1;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.5s linear;
    pointer-events: none;
  }

  .progress-bar:hover .progress-fill {
    background: var(--accent);
  }

  .player-right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
  }

  .volume-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .vol-icon {
    color: var(--text-muted);
    font-size: 13px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 80px;
    height: 4px;
    background: var(--surface3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--text);
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.15s;
  }

  input[type="range"]:hover::-webkit-slider-thumb {
    background: var(--accent);
  }

  /* ── VIDEO PANEL ── */
  .video-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(8px);
  }

  .video-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .video-panel {
    background: var(--surface);
    border-radius: 12px;
    overflow: hidden;
    width: min(720px, 92vw);
    border: 1px solid var(--border);
    box-shadow: 0 32px 80px rgba(0,0,0,0.7);
  }

  .video-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .video-panel-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .video-panel-close {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    padding: 4px;
    transition: color 0.15s;
  }

  .video-panel-close:hover { color: var(--text); }

  #yt-container {
    position: relative;
    width: 100%;
    padding-top: 56.25%;
    background: #000;
  }

  #yt-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  .video-note {
    padding: 16px 20px;
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
    line-height: 1.6;
    font-weight: 300;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }

  /* ── NOTE MODAL ── */
  .note-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    backdrop-filter: blur(4px);
  }

  .note-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .note-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
    max-width: 420px;
    width: 90vw;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  }

  .note-card-band {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .note-card-song {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 16px;
    letter-spacing: 0.03em;
  }

  .note-card-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.75;
    font-weight: 300;
    font-style: italic;
  }

  .note-card-close {
    margin-top: 20px;
    display: block;
    width: 100%;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 9px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
  }

  .note-card-close:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* SVG icons inline */
  svg { display: block; }

  .no-tracks {
    padding: 40px 32px;
    color: var(--text-dim);
    font-size: 13px;
    font-style: italic;
  }

  /* ── MOBILE HAMBURGER ── */
  .hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
  }

  .sidebar-overlay.open { display: block; }

  /* ── RESPONSIVE ── */
  @media (max-width: 680px) {
    :root {
      --player-h: 110px;
    }

    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr var(--player-h);
    }

    .sidebar {
      position: fixed;
      left: -100%;
      top: 0;
      height: 100%;
      width: 260px;
      z-index: 60;
      transition: left 0.25s ease;
    }

    .sidebar.open {
      left: 0;
    }

    .main {
      grid-column: 1;
    }

    .main-header {
      padding: 16px 16px 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .main-header-text { flex: 1; }

    .hamburger {
      display: flex;
      align-items: center;
      margin-top: 4px;
    }

    .genre-title { font-size: 22px; }

    .track-table-header {
      grid-template-columns: 28px 1fr 60px;
      padding: 10px 16px;
      margin-top: 12px;
    }

    .track-table-header span:nth-child(3) { display: none; }

    .track-row {
      grid-template-columns: 28px 1fr 60px;
      padding: 0 16px;
      height: 60px;
      margin: 0 4px;
    }

    .track-note-preview { display: none; }

    .player-bar {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      padding: 8px 16px;
      gap: 6px;
      height: var(--player-h);
    }

    .player-track {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-thumb { width: 36px; height: 36px; }

    .player-controls {
      width: 100%;
      flex-direction: row;
      align-items: center;
      gap: 10px;
    }

    .player-buttons { gap: 12px; }

    .ctrl-btn.play { width: 30px; height: 30px; }

    .progress-row { flex: 1; }

    .player-right { display: none; }
  }
</style>
</head>
<body>

<!-- SIDEBAR OVERLAY (mobile) -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Bandas que eu gosto<br>e recomendo</div>
      <div class="sidebar-subtitle">Lista do que mais gosto no momento</div>
    </div>
    <div class="genre-list" id="genre-list"></div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="main-header">
      <button class="hamburger" id="hamburger" title="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="main-header-text">
        <div class="genre-title" id="genre-title">Metal</div>
        <div class="genre-desc" id="genre-desc"></div>
      </div>
    </div>
    <div class="track-table-header">
      <span>#</span>
      <span>Banda / Música</span>
      <span>Nota pessoal</span>
      <span style="text-align:right"></span>
    </div>
    <div class="track-list" id="track-list"></div>
  </main>

  <!-- PLAYER BAR -->
  <div class="player-bar">
    <div class="player-track">
      <div class="player-thumb" id="player-thumb">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <div class="player-track-info">
        <div class="player-track-name" id="player-track-name">Nada tocando</div>
        <div class="player-track-artist" id="player-track-artist">Clique em uma música</div>
      </div>
    </div>

    <div class="player-controls">
      <div class="player-buttons">
        <button class="ctrl-btn" id="btn-prev" title="Anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play" id="btn-play" title="Play/Pause">
          <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="btn-next" title="Próxima">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 8.5 6V6z"/></svg>
        </button>
      </div>
      <div class="progress-row">
        <span class="time-label" id="time-cur">0:00</span>
        <div class="progress-bar" id="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time-label" id="time-dur">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <button class="ctrl-btn" id="btn-video" title="Ver vídeo" style="gap:6px;font-size:11px;color:var(--text-muted);padding:6px 12px;border:1px solid var(--border);border-radius:20px;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M10 15l5.19-3L10 9v6zm12-7H2v12h20V8zM2 6h20V4H2v2z"/></svg>
        Abrir vídeo
      </button>
      <div class="volume-row">
        <svg class="vol-icon" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" id="volume" min="0" max="100" value="80">
      </div>
    </div>
  </div>
</div>

<!-- IFRAME OCULTO - necessário para YT API funcionar corretamente -->
<div id="yt-hidden-container" style="position:fixed;left:-9999px;top:-9999px;width:480px;height:270px;pointer-events:none;opacity:0;z-index:-1;">
  <iframe id="yt-frame"
    src="https://www.youtube.com/embed/?enablejsapi=1&origin=https://www.youtube.com"
    allowfullscreen

// ── STATE ──
let currentGenreId = 'metal';
let currentTrackIndex = -1;
let isPlaying = false;
let ytPlayer = null;
let progressTimer = null;

// ── YT API ──
function loadYTApi() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-frame', {
    playerVars: { autoplay: 0, enablejsapi: 1, origin: 'https://www.youtube.com' },
    events: {
      onStateChange: onPlayerStateChange,
      onReady: onPlayerReady
    }
  });
};

function onPlayerReady(e) {
  const vol = parseInt(document.getElementById('volume').value);
  ytPlayer.setVolume(vol);
}

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.ENDED) {
    playNext();
    return;
  }
  if (e.data === YT.PlayerState.PLAYING) {
    isPlaying = true;
    updatePlayIcon();
    startProgressTimer();
  } else if (e.data === YT.PlayerState.PAUSED) {
    isPlaying = false;
    updatePlayIcon();
    clearProgressTimer();
  }
}

function startProgressTimer() {
  clearProgressTimer();
  progressTimer = setInterval(() => {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
    const cur = ytPlayer.getCurrentTime() || 0;
    const dur = ytPlayer.getDuration() || 0;
    document.getElementById('time-cur').textContent = formatTime(cur);
    document.getElementById('time-dur').textContent = formatTime(dur);
    if (dur > 0) {
      document.getElementById('progress-fill').style.width = (cur / dur * 100) + '%';
    }
  }, 500);
}

function clearProgressTimer() {
  if (progressTimer) clearInterval(progressTimer);
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

// ── RENDER SIDEBAR ──
function renderSidebar() {
  const el = document.getElementById('genre-list');
  el.innerHTML = '';
  genres.forEach(g => {
    const item = document.createElement('div');
    item.className = 'genre-item' + (g.id === currentGenreId ? ' active' : '');
    item.textContent = g.label;
    item.onclick = () => selectGenre(g.id);
    el.appendChild(item);
  });
}

// ── RENDER TRACKS ──
function renderTracks() {
  const genre = genres.find(g => g.id === currentGenreId);
  document.getElementById('genre-title').textContent = genre.label;
  document.getElementById('genre-desc').textContent = genre.desc;

  const list = document.getElementById('track-list');
  list.innerHTML = '';

  genre.tracks.forEach((t, i) => {
    const row = document.createElement('div');
    row.className = 'track-row' + (currentTrackIndex === i && isCurrentGenre() ? ' playing' : '');
    row.innerHTML = `
      <div class="track-num">
        <span class="track-num-static">${i + 1}</span>
        <div class="playing-bars"><span></span><span></span><span></span></div>
      </div>
      <div class="track-info">
        <div class="track-name">${t.song}</div>
        <div class="track-artist">${t.band}</div>
      </div>
      <div class="track-note-preview">${t.note ? '"' + t.note.substring(0, 60) + (t.note.length > 60 ? '…' : '') + '"' : ''}</div>
      <div class="track-duration"></div>
      ${t.note ? `<button class="note-btn" title="Ver nota">i</button>` : ''}
    `;

    row.addEventListener('click', (e) => {
      if (e.target.classList.contains('note-btn')) {
        showNote(t);
        return;
      }
      playTrack(i);
    });

    if (t.note) {
      row.querySelector('.note-btn')?.addEventListener('click', (e) => {
        e.stopPropagation();
        showNote(t);
      });
    }

    list.appendChild(row);
  });
}

function isCurrentGenre() {
  return true; // simplified: track index is genre-scoped in state
}

// ── PLAY ──
function playTrack(index) {
  const genre = genres.find(g => g.id === currentGenreId);
  const track = genre.tracks[index];
  if (!track) return;

  currentTrackIndex = index;
  isPlaying = true;

  // update player bar
  document.getElementById('player-track-name').textContent = track.song;
  document.getElementById('player-track-artist').textContent = track.band;

  // update video panel title
  document.getElementById('video-panel-title').textContent = track.band + ' — ' + track.song;
  document.getElementById('video-note').textContent = track.note || '';
  document.getElementById('video-note').style.display = track.note ? 'block' : 'none';

  // load YT
  if (ytPlayer && typeof ytPlayer.loadVideoById === 'function') {
    ytPlayer.loadVideoById(track.yt);
  } else {
    // fallback: set src directly
    const frame = document.getElementById('yt-frame');
    frame.src = `https://www.youtube.com/embed/${track.yt}?autoplay=1&enablejsapi=1&origin=https://www.youtube.com`;
  }

  updatePlayIcon();
  renderTracks();
}

function playNext() {
  const genre = genres.find(g => g.id === currentGenreId);
  const next = (currentTrackIndex + 1) % genre.tracks.length;
  playTrack(next);
}

function playPrev() {
  const genre = genres.find(g => g.id === currentGenreId);
  const prev = (currentTrackIndex - 1 + genre.tracks.length) % genre.tracks.length;
  playTrack(prev);
}

function togglePlay() {
  if (currentTrackIndex === -1) return;
  if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return;
  try {
    const state = ytPlayer.getPlayerState();
    if (state === YT.PlayerState.PLAYING) {
      ytPlayer.pauseVideo();
    } else {
      ytPlayer.playVideo();
    }
  } catch(err) {
    console.warn('togglePlay error:', err);
  }
}

function updatePlayIcon() {
  const icon = document.getElementById('play-icon');
  if (isPlaying) {
    icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
  } else {
    icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
}

// ── SELECT GENRE ──
function selectGenre(id) {
  currentGenreId = id;
  currentTrackIndex = -1;
  renderSidebar();
  renderTracks();
  // Fechar sidebar no mobile
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── VIDEO OVERLAY ──
function openVideoOverlay() {
  if (currentTrackIndex === -1) return;
  // Move o iframe para dentro do overlay (mantém o player ativo)
  const frame = document.getElementById('yt-frame');
  const container = document.getElementById('yt-container');
  if (frame && container && frame.parentNode !== container) {
    container.appendChild(frame);
  }
  document.getElementById('video-overlay').classList.add('open');
}

function closeVideoOverlay() {
  // Devolve o iframe para o container oculto (player continua tocando)
  const frame = document.getElementById('yt-frame');
  const hidden = document.getElementById('yt-hidden-container');
  if (frame && hidden && frame.parentNode !== hidden) {
    hidden.appendChild(frame);
  }
  document.getElementById('video-overlay').classList.remove('open');
}

document.getElementById('btn-video').addEventListener('click', openVideoOverlay);
document.getElementById('video-close').addEventListener('click', closeVideoOverlay);
document.getElementById('video-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('video-overlay')) {
    closeVideoOverlay();
  }
});

// ── NOTE MODAL ──
function showNote(track) {
  document.getElementById('note-band').textContent = track.band;
  document.getElementById('note-song').textContent = track.song;
  document.getElementById('note-text').textContent = track.note;
  document.getElementById('note-overlay').classList.add('open');
}

document.getElementById('note-close').addEventListener('click', () => {
  document.getElementById('note-overlay').classList.remove('open');
});

document.getElementById('note-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('note-overlay')) {
    document.getElementById('note-overlay').classList.remove('open');
  }
});

// ── CONTROLS ──
document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-next').addEventListener('click', playNext);
document.getElementById('btn-prev').addEventListener('click', playPrev);

document.getElementById('volume').addEventListener('input', (e) => {
  const vol = parseInt(e.target.value);
  if (ytPlayer && typeof ytPlayer.setVolume === 'function') {
    try { ytPlayer.setVolume(vol); } catch(err) {}
  }
  // Atualiza visual do range
  const pct = vol + '%';
  e.target.style.background = `linear-gradient(to right, var(--accent) ${pct}, var(--surface3) ${pct})`;
});

document.getElementById('progress-bar').addEventListener('click', (e) => {
  if (!ytPlayer || typeof ytPlayer.getDuration !== 'function') return;
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const dur = ytPlayer.getDuration();
  ytPlayer.seekTo(pct * dur, true);
});

// ── MOBILE SIDEBAR ──
document.getElementById('hamburger').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
});

document.getElementById('sidebar-overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
});

// ── INIT ──
loadYTApi();
renderSidebar();
renderTracks();

// Inicializar visual do volume
(function() {
  const vol = document.getElementById('volume');
  const pct = vol.value + '%';
  vol.style.background = `linear-gradient(to right, var(--accent) ${pct}, var(--surface3) ${pct})`;
})();
</script>
